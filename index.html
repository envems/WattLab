<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern WHOOP-Inspired Design</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3 {
            font-family: 'Roboto', sans-serif;
            margin: 10px 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            padding: 20px;
            margin: 20px 0;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Modern WHOOP-Inspired Page</h1>
    </header>
    <main>
        <div class="card">
            <h2>About Us</h2>
            <p>This section contains information about our project with a modern look and feel.</p>
        </div>
        <div class="card">
            <h2>Features</h2>
            <p>Discover the features of our application, enhanced with better typography and animations.</p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 WHOOP-Inspired Design. All rights reserved.</p>
    </footer>
    <script>
        // Keeping all JavaScript functions intact
        function init() {
            console.log('Page initialized');
        }
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
